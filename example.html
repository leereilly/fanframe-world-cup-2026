<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Examples — World Cup 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Tiny5&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 2rem 1rem;
    }
    h1 { text-align: center; font-size: 1.6rem; margin-bottom: 0.25rem; }
    .subtitle { text-align: center; color: #8b949e; font-size: 0.85rem; margin-bottom: 2rem; }
    h2 { font-size: 1rem; color: #8b949e; margin: 2rem 0 1rem; padding-left: 1rem; border-left: 3px solid #30363d; }
    .grid {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 1.25rem;
      max-width: 1200px; margin: 0 auto;
    }
    .card {
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
      width: 80px;
    }
    .card canvas { border-radius: 50%; }
    .card .label { font-size: 0.6rem; color: #8b949e; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
    .contexts { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
    .tweet { background: #16181c; border: 1px solid #2f3336; border-radius: 16px; padding: 1rem; display: flex; gap: 0.75rem; }
    .tweet canvas { width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0; }
    .tweet .tweet-body { font-size: 0.85rem; line-height: 1.4; }
    .tweet .tweet-name { font-weight: 700; }
    .tweet .tweet-handle { color: #71767b; margin-left: 0.25rem; }
    .tweet .tweet-text { margin-top: 0.25rem; color: #e7e9ea; }
    .slack-msg { background: #1a1d21; border: 1px solid #2c2f33; border-radius: 8px; padding: 0.75rem 1rem; display: flex; gap: 0.6rem; }
    .slack-msg canvas { width: 36px; height: 36px; border-radius: 6px; flex-shrink: 0; }
    .slack-msg .slack-body { font-size: 0.82rem; line-height: 1.4; }
    .slack-msg .slack-name { font-weight: 700; }
    .slack-msg .slack-time { color: #71767b; font-size: 0.7rem; margin-left: 0.4rem; }
    .gh-comment { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 0.75rem 1rem; display: flex; gap: 0.6rem; }
    .gh-comment canvas { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
    .gh-comment .gh-body { font-size: 0.82rem; line-height: 1.5; }
    .gh-comment .gh-name { font-weight: 600; color: #58a6ff; }
    .sizes-row { display: flex; align-items: flex-end; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
    .size-item { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
    .size-item canvas { border-radius: 50%; }
    .size-item .label { font-size: 0.6rem; color: #8b949e; }
  </style>
</head>
<body>
  <h1>⚽ Avatar Treatment Examples</h1>
  <p class="subtitle">Circular country-color border + country code — previewed at real-world sizes</p>

  <h2>📐 Size Comparison (one avatar at different sizes)</h2>
  <div id="sizes-row" class="sizes-row"></div>

  <h2>🐦 As seen on X / Twitter (48px)</h2>
  <div id="tweets" class="contexts"></div>

  <h2>💬 As seen on Slack (36px)</h2>
  <div id="slacks" class="contexts"></div>

  <h2>🐙 As seen on GitHub (32px)</h2>
  <div id="ghcomments" class="contexts"></div>

  <h2>🏟️ All 48 Teams (64px circular)</h2>
  <div id="all-teams" class="grid"></div>

  <script src="teams.js"></script>
  <script>
  (async function() {
    // Wait for Tiny5 font to load before any canvas drawing
    await document.fonts.load("16px 'Tiny5'");

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = url;
      });
    }

    function luminance(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255;
      const g = parseInt(hex.slice(3, 5), 16) / 255;
      const b = parseInt(hex.slice(5, 7), 16) / 255;
      return 0.2126 * r + 0.7152 * g + 0.0722 * b;
    }

    function saturation(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255;
      const g = parseInt(hex.slice(3, 5), 16) / 255;
      const b = parseInt(hex.slice(5, 7), 16) / 255;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      return max === 0 ? 0 : (max - min) / max;
    }

    function pickVividColor(colors) {
      const pool = colors.filter((h) => luminance(h) < 0.82);
      const list = pool.length ? pool : colors;
      let best = list[0];
      let bestScore = -Infinity;
      for (const h of list) {
        const score = saturation(h) - Math.abs(luminance(h) - 0.5) * 0.4;
        if (score > bestScore) { bestScore = score; best = h; }
      }
      return best;
    }

    function drawColorRing(c, cx, cy, outerR, innerR, colors) {
      const count = colors.length;
      if (count === 1) {
        c.beginPath();
        c.arc(cx, cy, outerR, 0, Math.PI * 2);
        c.arc(cx, cy, innerR, 0, Math.PI * 2, true);
        c.fillStyle = colors[0];
        c.fill();
        return;
      }
      const segmentAngle = (Math.PI * 2) / count;
      colors.forEach((color, i) => {
        const startAngle = segmentAngle * i - Math.PI / 2;
        const endAngle = segmentAngle * (i + 1) - Math.PI / 2;
        c.beginPath();
        c.arc(cx, cy, outerR, startAngle, endAngle);
        c.arc(cx, cy, innerR, endAngle, startAngle, true);
        c.closePath();
        c.fillStyle = color;
        c.fill();
      });
      c.strokeStyle = "rgba(255,255,255,0.22)";
      c.lineWidth = Math.max((outerR - innerR) * 0.04, 1);
      for (let i = 0; i < count; i++) {
        const angle = segmentAngle * i - Math.PI / 2;
        c.beginPath();
        c.moveTo(cx + innerR * Math.cos(angle), cy + innerR * Math.sin(angle));
        c.lineTo(cx + outerR * Math.cos(angle), cy + outerR * Math.sin(angle));
        c.stroke();
      }
    }

    function drawCountryCode(c, cx, cy, innerR, team, size) {
      const colors = team.colors;
      const code = team.code;
      const fontSize = Math.max(Math.round(innerR * 0.32), 12);
      const textY = cy + innerR * 0.55;
      c.font = `${fontSize}px 'Tiny5', monospace`;
      c.textBaseline = "middle";
      c.textAlign = "left";
      c.letterSpacing = "0px";
      const letters = code.split("");
      const widths = letters.map((l) => c.measureText(l).width);
      const gap = Math.max(fontSize * 0.1, 2);
      const totalWidth = widths.reduce((a, b) => a + b, 0) + gap * (letters.length - 1);
      let x = cx - totalWidth / 2;
      const perLetter = colors.length >= 3 && letters.length === 3;
      const single = perLetter ? null : pickVividColor(colors);
      letters.forEach((letter, i) => {
        const fill = perLetter ? colors[i] : single;
        c.save();
        c.shadowColor = "rgba(0,0,0,0.55)";
        c.shadowBlur = Math.max(size * 0.022, 4);
        c.shadowOffsetY = Math.max(size * 0.005, 1);
        c.fillStyle = fill;
        c.fillText(letter, x, textY);
        c.restore();
        c.lineJoin = "round";
        c.lineWidth = Math.max(fontSize * 0.16, 2);
        c.strokeStyle = luminance(fill) > 0.5 ? "rgba(0,0,0,0.9)" : "rgba(255,255,255,0.92)";
        c.strokeText(letter, x, textY);
        c.fillStyle = fill;
        c.fillText(letter, x, textY);
        x += widths[i] + gap;
      });
    }

    function renderAvatar(cvs, img, team) {
      const size = cvs.width;
      const c = cvs.getContext("2d");
      const cx = size / 2;
      const cy = size / 2;
      const colors = team.colors;

      c.clearRect(0, 0, size, size);

      const ringOuter = size / 2;
      const ringWidth = Math.max(size * 0.08, 6);
      const ringInner = ringOuter - ringWidth;
      const sep = Math.max(size * 0.0075, 1);

      c.save();
      c.beginPath();
      c.arc(cx, cy, ringInner, 0, Math.PI * 2);
      c.closePath();
      c.clip();
      c.drawImage(img, 0, 0, size, size);
      const vignette = c.createRadialGradient(cx, cy, ringInner * 0.62, cx, cy, ringInner);
      vignette.addColorStop(0, "rgba(0,0,0,0)");
      vignette.addColorStop(1, "rgba(0,0,0,0.22)");
      c.fillStyle = vignette;
      c.fillRect(0, 0, size, size);
      const scrim = c.createLinearGradient(0, cy, 0, size);
      scrim.addColorStop(0, "rgba(0,0,0,0)");
      scrim.addColorStop(1, "rgba(0,0,0,0.5)");
      c.fillStyle = scrim;
      c.fillRect(0, cy, size, size - cy);
      c.restore();

      drawColorRing(c, cx, cy, ringOuter, ringInner, colors);

      c.strokeStyle = "rgba(255,255,255,0.95)";
      c.lineWidth = sep * 1.8;
      c.beginPath();
      c.arc(cx, cy, ringInner, 0, Math.PI * 2);
      c.stroke();

      c.strokeStyle = "rgba(0,0,0,0.32)";
      c.lineWidth = sep * 1.4;
      c.beginPath();
      c.arc(cx, cy, ringOuter - sep * 0.7, 0, Math.PI * 2);
      c.stroke();

      drawCountryCode(c, cx, cy, ringInner, team, size);
    }

    async function getAvatars(count) {
      const avatars = [];
      try {
        const res = await fetch("https://api.github.com/events?per_page=100");
        if (res.ok) {
          const events = await res.json();
          const seen = new Set();
          for (const e of events) {
            if (avatars.length >= count) break;
            const login = e.actor?.login;
            const url = e.actor?.avatar_url;
            if (login && url && !seen.has(login)) {
              seen.add(login);
              avatars.push({ login, url });
            }
          }
        }
      } catch {}
      while (avatars.length < count) {
        const id = Math.floor(Math.random() * 100000000);
        avatars.push({ login: `user${id}`, url: `https://avatars.githubusercontent.com/u/${id}?v=4` });
      }
      return avatars;
    }

    const avatars = await getAvatars(55);
    let avatarIdx = 0;
    function nextAvatar() { return avatars[avatarIdx++ % avatars.length]; }

    // ── Size comparison ──
    const sizesRow = document.getElementById("sizes-row");
    const sizeTests = [
      { px: 128, label: "128px (profile)" },
      { px: 64, label: "64px (grid)" },
      { px: 48, label: "48px (tweet)" },
      { px: 36, label: "36px (Slack)" },
      { px: 32, label: "32px (GitHub)" },
      { px: 24, label: "24px (tiny)" },
    ];
    const sizeAvatar = nextAvatar();
    const sizeTeam = TEAMS.find(t => t.code === "BRA");
    try {
      const sizeImg = await loadImage(sizeAvatar.url + "&s=256");
      for (const s of sizeTests) {
        const item = document.createElement("div");
        item.className = "size-item";
        const cvs = document.createElement("canvas");
        const renderSize = Math.max(s.px * 2, 128);
        cvs.width = renderSize; cvs.height = renderSize;
        cvs.style.width = s.px + "px"; cvs.style.height = s.px + "px";
        renderAvatar(cvs, sizeImg, sizeTeam);
        item.appendChild(cvs);
        const lbl = document.createElement("div");
        lbl.className = "label";
        lbl.textContent = s.label;
        item.appendChild(lbl);
        sizesRow.appendChild(item);
      }
    } catch {}

    // ── Tweet examples ──
    const tweetContainer = document.getElementById("tweets");
    const tweetData = [
      { team: "USA", text: "Can't wait for the World Cup on home soil! 🇺🇸⚽" },
      { team: "BRA", text: "Neymar is back and Brazil is ready 🇧🇷🔥" },
      { team: "ARG", text: "Defending champions. Vamos Argentina! 🏆" },
      { team: "ENG", text: "Football's coming home. Again. Maybe. 😅🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
      { team: "JPN", text: "Japan's golden generation is peaking at the right time 🇯🇵" },
    ];
    for (const td of tweetData) {
      const a = nextAvatar();
      const team = TEAMS.find(t => t.code === td.team);
      try {
        const img = await loadImage(a.url + "&s=200");
        const cvs = document.createElement("canvas");
        cvs.width = 200; cvs.height = 200;
        renderAvatar(cvs, img, team);
        const tweet = document.createElement("div");
        tweet.className = "tweet";
        tweet.appendChild(cvs);
        const body = document.createElement("div");
        body.className = "tweet-body";
        body.innerHTML = `<span class="tweet-name">${a.login}</span><span class="tweet-handle">@${a.login}</span><p class="tweet-text">${td.text}</p>`;
        tweet.appendChild(body);
        tweetContainer.appendChild(tweet);
      } catch {}
    }

    // ── Slack examples ──
    const slackContainer = document.getElementById("slacks");
    const slackData = [
      { team: "GER", text: "Anyone want to grab lunch and watch the match? 🍻" },
      { team: "MEX", text: "¡Vamos México! Office watch party in the big conference room" },
      { team: "FRA", text: "Allez les Bleus! Setting up the projector now 📺" },
      { team: "SCO", text: "We're actually in it this time lads 🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
      { team: "KOR", text: "The Red Devils will make another miracle run 🇰🇷" },
    ];
    for (const sd of slackData) {
      const a = nextAvatar();
      const team = TEAMS.find(t => t.code === sd.team);
      try {
        const img = await loadImage(a.url + "&s=200");
        const cvs = document.createElement("canvas");
        cvs.width = 200; cvs.height = 200;
        cvs.style.borderRadius = "6px";
        renderAvatar(cvs, img, team);
        const msg = document.createElement("div");
        msg.className = "slack-msg";
        msg.appendChild(cvs);
        const body = document.createElement("div");
        body.className = "slack-body";
        body.innerHTML = `<span class="slack-name">${a.login}</span><span class="slack-time">10:26 AM</span><p>${sd.text}</p>`;
        msg.appendChild(body);
        slackContainer.appendChild(msg);
      } catch {}
    }

    // ── GitHub comment examples ──
    const ghContainer = document.getElementById("ghcomments");
    const ghData = [
      { team: "ESP", text: "LGTM — nice refactor. Merging now. 🇪🇸" },
      { team: "NED", text: "Can we add a test for the edge case on line 42?" },
      { team: "POR", text: "Fixed the CI failure — was a flaky network test 🔧" },
      { team: "CAN", text: "Reviewed the migration plan, looks solid 🍁👍" },
      { team: "MAR", text: "This PR improves performance by 3x on the benchmark 🚀" },
    ];
    for (const gd of ghData) {
      const a = nextAvatar();
      const team = TEAMS.find(t => t.code === gd.team);
      try {
        const img = await loadImage(a.url + "&s=200");
        const cvs = document.createElement("canvas");
        cvs.width = 200; cvs.height = 200;
        renderAvatar(cvs, img, team);
        const comment = document.createElement("div");
        comment.className = "gh-comment";
        comment.appendChild(cvs);
        const body = document.createElement("div");
        body.className = "gh-body";
        body.innerHTML = `<span class="gh-name">${a.login}</span> commented<p>${gd.text}</p>`;
        comment.appendChild(body);
        ghContainer.appendChild(comment);
      } catch {}
    }

    // ── All 48 teams grid ──
    const allGrid = document.getElementById("all-teams");
    for (const team of TEAMS) {
      const a = nextAvatar();
      try {
        const img = await loadImage(a.url + "&s=200");
        const card = document.createElement("div");
        card.className = "card";
        const cvs = document.createElement("canvas");
        cvs.width = 200; cvs.height = 200;
        cvs.style.width = "64px"; cvs.style.height = "64px";
        renderAvatar(cvs, img, team);
        card.appendChild(cvs);
        const lbl = document.createElement("div");
        lbl.className = "label";
        lbl.textContent = `${team.flag} ${team.name}`;
        card.appendChild(lbl);
        allGrid.appendChild(card);
      } catch {}
    }
  })();
  </script>
</body>
</html>
